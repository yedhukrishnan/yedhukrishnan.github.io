# Site
title: Yedhu Krishnan
tagline:
description: >-
  Notes on programming, books, and things I'm learning.
url: "https://yedhu.me"
lang: en
timezone: Asia/Kolkata

author:
  name: Yedhu Krishnan
  email: dev@yedhu.me

# Used by jekyll-seo-tag
twitter:
  username: yedhukrishnan
social:
  name: Yedhu Krishnan
  links:
    - https://github.com/yedhukrishnan
    - https://x.com/yedhukrishnan
social_preview_image: /assets/img/avatar/yedhu.jpg

github_username: yedhukrishnan

# Comments (giscus)
giscus:
  repo: yedhukrishnan/yedhukrishnan.github.io
  repo_id: R_kgDOIS5mvQ
  category: General
  category_id: DIC_kwDOIS5mvc4Cv6cZ

# Build
permalink: /posts/:title/
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true

sass:
  style: compressed

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
