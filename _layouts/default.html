<!doctype html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('theme'); } catch (e) {}
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  {% seo %}
  {% feed_meta %}
  <link rel="icon" href="/assets/img/favicons/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/assets/img/favicons/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/"><span class="prompt">~</span>/yedhu</a>
    <nav class="site-nav">
      <a href="/">posts</a>
      <a href="/about/">about</a>
      <a href="/feed.xml">rss</a>
      <button id="theme-toggle" aria-label="Toggle color scheme"></button>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ 'now' | date: '%Y' }} {{ site.author.name }}</span>
    <span class="footer-links">
      <a href="https://github.com/{{ site.github_username }}">github</a>
      <a href="https://x.com/{{ site.twitter.username }}">x</a>
      <a href="mailto:{{ site.author.email }}">email</a>
    </span>
  </footer>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      var giscus = document.querySelector('iframe.giscus-frame');
      if (giscus) {
        giscus.contentWindow.postMessage(
          { giscus: { setConfig: { theme: next === 'dark' ? 'dark_dimmed' : 'light' } } },
          'https://giscus.app'
        );
      }
    });
  </script>
</body>
</html>
